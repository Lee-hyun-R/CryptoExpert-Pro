<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoExpert Pro</title>
    <link rel="icon" href="/static/logo.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-main: #ffffff;
            --bg-sidebar: #f0f4f9;
            --text-primary: #1f1f1f;
            --text-secondary: #444746;
            --accent-blue: #0b57d0;
            --user-msg-bg: #f0f4f9;
            --sidebar-active: #d3e3fd;
            --input-focus-shadow: 0 1px 6px rgba(32,33,36,0.28);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Noto Sans SC', sans-serif;
            background-color: var(--bg-main); color: var(--text-primary);
            overflow: hidden;
        }

        .container { display: flex; height: 100vh; width: 100vw; }

        /* --- 侧边栏 --- */
        .sidebar {
            width: 280px; background: var(--bg-sidebar);
            display: flex; flex-direction: column; padding: 12px;
            box-sizing: border-box; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden; white-space: nowrap;
        }
        .sidebar.collapsed { width: 68px; }
        .sidebar-header { display: flex; align-items: center; margin-bottom: 20px; }
        .menu-toggle {
            background: none; border: none; cursor: pointer; padding: 8px;
            border-radius: 50%; color: var(--text-secondary);
            display: flex; align-items: center; justify-content: center;
        }
        .menu-toggle:hover { background: #e1e5ea; }

        .new-chat {
            display: flex; align-items: center; gap: 12px;
            background: #e3eefc; border: none; padding: 14px 20px;
            border-radius: 16px; cursor: pointer; font-weight: 500;
            color: #041e49; width: fit-content; transition: all 0.2s;
        }
        .sidebar.collapsed .new-chat { padding: 14px 0; width: 44px; justify-content: center; border-radius: 50%; }
        .sidebar.collapsed .btn-text, .sidebar.collapsed .history-label, .sidebar.collapsed .item-text, .sidebar.collapsed .delete-chat { display: none; }

        .history-label { font-size: 12px; color: var(--text-secondary); padding: 20px 0 8px 16px; font-weight: 700; }
        .history-list { flex: 1; overflow-y: auto; }

        .history-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 16px; border-radius: 24px; font-size: 14px;
            cursor: pointer; margin-bottom: 4px; transition: 0.2s;
            position: relative;
        }
        .history-item:hover { background: #e9eef6; }
        .history-item.active { background: var(--sidebar-active); }
        .item-text { flex: 1; overflow: hidden; text-overflow: ellipsis; }

        .delete-chat {
            opacity: 0; padding: 4px; border-radius: 50%;
            transition: opacity 0.2s, background 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .history-item:hover .delete-chat { opacity: 1; }
        .delete-chat:hover { background: rgba(0,0,0,0.1); color: #d93025; }

        /* --- 主聊天区 --- */
        .chat-main { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
.chat-header {
            padding: 16px 24px;
            font-size: 18px;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
        }
        .chat-header > span:first-child {
            background: linear-gradient(90deg, #4285f4, #9b72cb, #d96570);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 600;
        }
        .model-selector {
            position: relative;
            z-index: 1000;
        }
        .model-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
        }
        .model-btn svg {
            width: 14px;
            height: 14px;
        }
        .model-menu {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 6px;
            min-width: 180px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            display: none;
            overflow: hidden;
        }
        .model-dropdown.open .model-menu {
            display: block;
        }
        .model-option {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 18px;
            cursor: pointer;
        }
        .model-option:hover {
            background: rgba(255, 255, 255, 0.5);
        }
        .model-option.selected {
            background: rgba(102, 126, 234, 0.2);
        }
        .model-option-name {
            font-size: 14px;
            color: #333;
            font-weight: 500;
        }

        .messages-container {
            flex: 1; overflow-y: auto; padding: 20px;
            width: 100%; max-width: 850px; margin: 0 auto;
            box-sizing: border-box; display: flex; flex-direction: column;
            background: #fff;
        }

        /* --- 欢迎界面 --- */
        .welcome-screen { text-align: left; margin-top: 15vh; animation: fadeIn 0.5s ease; }
        .gradient-text {
            font-size: 48px; font-weight: 500;
            background: linear-gradient(90deg, #4285f4, #9b72cb, #d96570);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin: 0; letter-spacing: -1px;
        }
        .subtitle { font-size: 32px; color: #c4c7c5; font-weight: 500; margin-top: 8px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- 消息气泡 --- */
        .message-row { display: flex; width: 100%; margin-bottom: 32px; align-items: flex-start; }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            margin-right: 16px;
            flex-shrink: 0;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: linear-gradient(135deg, #4285f4, #9b72cb);
            background-size: 200% 200%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1), inset 0 0 10px rgba(255,255,255,0.4);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .avatar::before {
            content: "";
            position: absolute;
            width: 150%; height: 150%;
            background: radial-gradient(circle, rgba(255,255,255,0.5) 0%, transparent 70%);
            top: -25%; left: -25%; transform: rotate(0deg);
        }

        .loading-subtext {
            color: #888ea1;
            font-size: 15px;
            vertical-align: middle;
            letter-spacing: 0.3px;
            animation: textFade 1.5s ease-in-out infinite;
        }

        @keyframes geminiFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes internalRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 12px rgba(66, 133, 244, 0.3), inset 0 0 10px rgba(255,255,255,0.4); transform: scale(1); }
            50% { box-shadow: 0 0 25px rgba(155, 114, 203, 0.7), inset 0 0 15px rgba(255,255,255,0.6); transform: scale(1.05); }
        }

        @keyframes textFade {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .thinking-avatar {
            animation: geminiFlow 2s ease infinite, pulseGlow 1.5s ease-in-out infinite;
        }

        .thinking-avatar::before { animation: internalRotate 3s linear infinite; }

        /* --- 消息内容核心修复 --- */
        .message-content {
            max-width: 85%;
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 16px;
            line-height: 1.6;
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: break-all;
            color: #1f1f1f;
        }
        .user-row { justify-content: flex-end; }
        .user-row .message-content {
            background: #f0f4f9 !important;
            border-bottom-right-radius: 4px;
            color: #000 !important;
            text-align: left;
        }
        .ai-row { justify-content: flex-start; display: flex; align-items: flex-start; }
        .ai-row .avatar {
            width: 36px;
            height: 36px;
            min-width: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4285f4, #9b72cb) !important;
            flex-shrink: 0;
            margin-right: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .ai-row .message-content {
            background: #fff !important;
            border: 1px solid #eee;
            border-bottom-left-radius: 4px;
            flex: 1;
            padding: 12px 18px;
            font-size: 16px;
            line-height: 1.6;
            color: #000 !important;
            min-width: 200px;
            text-align: left;
        }

        /* --- Markdown 表格样式修复 --- */
        .markdown-body table {
            border-collapse: collapse;
            width: 100%;
            margin: 16px 0;
            overflow-x: auto;
            display: block; /* 移动端自适应 */
        }
        .markdown-body th, .markdown-body td {
            border: 1px solid #dfe2e5;
            padding: 8px 12px;
            text-align: left;
        }
        .markdown-body th {
            background-color: #f6f8fa;
            font-weight: 700;
        }
        .markdown-body tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        .markdown-body { text-align: left; }
        .markdown-body p { margin: 0 0 12px 0; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { margin-top: 16px; margin-bottom: 8px; color: var(--accent-blue); }
        .markdown-body code { background-color: rgba(175, 184, 193, 0.2); padding: 0.2em 0.4em; border-radius: 6px; font-family: monospace; font-size: 85%; }
        .markdown-body pre { background-color: #f6f8fa; padding: 16px; border-radius: 12px; overflow: auto; border: 1px solid #e1e4e8; margin: 12px 0; }

        /* 输入区 */
        .input-area {
            padding: 0 20px 20px; display: flex; flex-direction: column;
            align-items: center; background: linear-gradient(transparent, #fff 20%);
        }
        .input-container { width: 100%; max-width: 800px; display: flex; flex-direction: column; }
        .input-wrapper {
            background: #f0f4f9; border-radius: 28px; padding: 10px 16px 10px 24px;
            display: flex; align-items: flex-end; transition: 0.2s;
            border: 1px solid transparent; min-height: 52px; box-sizing: border-box;
        }
        .input-wrapper:focus-within { background: #ffffff; box-shadow: var(--input-focus-shadow); border-color: #dee2e6; }
        textarea {
            flex: 1; border: none; outline: none; background: transparent;
            font-size: 16px; resize: none; max-height: 200px; padding: 4px 0;
            margin: 0; font-family: inherit; line-height: 24px; color: var(--text-primary);
        }
        .send-btn {
            background: none; border: none; color: var(--accent-blue); cursor: pointer;
            padding: 4px; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; margin-left: 8px; margin-bottom: 2px; flex-shrink: 0;
        }
        .send-btn:hover { background: rgba(11, 87, 208, 0.1); }
        .disclaimer { font-size: 12px; text-align: center; color: var(--text-secondary); margin-top: 12px; letter-spacing: 0.3px; }
    </style>
</head>
<body>
    <div class="container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="menu-toggle" id="menuToggle">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
                </button>
            </div>
            <div class="sidebar-content">
                <button class="new-chat" id="newChatBtn">
                    <span>＋</span><span class="btn-text">新对话</span>
                </button>
                <div class="history-label">最近</div>
                <div class="history-list" id="historyList"></div>
            </div>
        </aside>

        <main class="chat-main">
            <header class="chat-header">
                <span>CryptoExpert Pro</span>
                <div class="model-selector" id="modelSelector">
                    <div class="model-dropdown" id="modelDropdown">
                        <button class="model-btn" id="modelBtn">
                            <span id="currentModelText">deepseek-chat</span>
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg>
                        </button>
                        <div class="model-menu">
                            <div class="model-option selected" data-value="deepseek-chat">
                                <span class="model-option-name">deepseek-chat</span>
                            </div>
                            <div class="model-option" data-value="qwen3.6-max-preview">
                                <span class="model-option-name">qwen3.6</span>
                            </div>
                        </div>
                    </div>
                </div>
            </header>
            <div class="messages-container" id="chatBox">
                <div class="welcome-screen" id="welcomeScreen">
                    <h2 class="gradient-text">你好，我是CryptoExpert Pro</h2>
                    <p class="subtitle">炫睿，又有什么新想法了？</p>
                </div>
            </div>
            <footer class="input-area">
                <div class="input-container">
                    <div class="input-wrapper">
                        <textarea id="userInput" placeholder="问问 CryptoExpert..." rows="1"></textarea>
                        <button id="sendBtn" class="send-btn">
                            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                        </button>
                    </div>
                    <p class="disclaimer">AI 可能会产生误差，请核实分析结果。</p>
                </div>
            </footer>
        </main>
    </div>

    <script>
        let currentThreadId = Date.now().toString();
        let chatHistories = JSON.parse(localStorage.getItem('crypto_chats') || '[]');

        const sidebar = document.getElementById('sidebar');
        const menuToggle = document.getElementById('menuToggle');
        const chatBox = document.getElementById('chatBox');
        const historyList = document.getElementById('historyList');
        const userInput = document.getElementById('userInput');

        let currentModel = 'deepseek-chat';

        menuToggle.onclick = () => sidebar.classList.toggle('collapsed');

        const modelDropdown = document.getElementById('modelDropdown');
        const modelBtn = document.getElementById('modelBtn');
        const currentModelText = document.getElementById('currentModelText');
        const modelOptions = document.querySelectorAll('.model-option');

        modelBtn.onclick = (e) => {
            e.stopPropagation();
            modelDropdown.classList.toggle('open');
        };

        modelOptions.forEach(option => {
            option.onclick = () => {
                modelOptions.forEach(o => o.classList.remove('selected'));
                option.classList.add('selected');
                currentModel = option.dataset.value;
                currentModelText.textContent = option.querySelector('.model-option-name').textContent;
                modelDropdown.classList.remove('open');
            };
        });

        document.addEventListener('click', () => {
            modelDropdown.classList.remove('open');
        });

        function renderHistoryList() {
            historyList.innerHTML = '';
            chatHistories.forEach(chat => {
                const item = document.createElement('div');
                item.className = `history-item ${chat.id === currentThreadId ? 'active' : ''}`;
                item.innerHTML = `
                    <span>💬</span>
                    <span class="item-text">${chat.title}</span>
                    <span class="delete-chat" title="删除对话" onclick="deleteChat(event, '${chat.id}')">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
                            <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
                        </svg>
                    </span>
                `;
                item.onclick = () => switchChat(chat.id, chat.title);
                historyList.appendChild(item);
            });
        }

        async function deleteChat(event, id) {
            event.stopPropagation();
            if (!confirm('确定要删除这段对话记录吗？')) return;
            try {
                await fetch(`/api/chat/${id}`, { method: 'DELETE' });
            } catch (e) {
                console.error("Failed to delete from database:", e);
            }
            chatHistories = chatHistories.filter(chat => chat.id !== id);
            localStorage.setItem('crypto_chats', JSON.stringify(chatHistories));
            if (id === currentThreadId) {
                currentThreadId = Date.now().toString();
                showWelcome();
            }
            renderHistoryList();
        }

        document.getElementById('newChatBtn').onclick = () => {
            currentThreadId = Date.now().toString();
            showWelcome();
            renderHistoryList();
        };

        function showWelcome() {
            chatBox.innerHTML = `<div class="welcome-screen"><h2 class="gradient-text">你好，我是CryptoExpert Pro</h2><p class="subtitle">接下来想要分析什么呢？</p></div>`;
        }

        async function switchChat(id, title) {
            currentThreadId = id;
            renderHistoryList();
            chatBox.innerHTML = '<div style="text-align:center; padding:20px; color:#999;">正在加载历史记录...</div>';
            try {
                const response = await fetch(`/api/history/${id}`);
                const data = await response.json();
                chatBox.innerHTML = '';
                if (data.history && data.history.length > 0) {
                    data.history.forEach(msg => appendMessage(msg.role, msg.content));
                } else {
                    showWelcome();
                }
            } catch (e) {
                console.error("加载历史失败:", e);
                chatBox.innerHTML = '<div style="text-align:center; padding:20px; color:red;">历史记录加载失败</div>';
            }
        }

        async function handleSendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            const welcome = document.querySelector('.welcome-screen');
            if (welcome) welcome.remove();

            if (!chatHistories.find(c => c.id === currentThreadId)) {
                chatHistories.unshift({ id: currentThreadId, title: text.substring(0, 15) });
                localStorage.setItem('crypto_chats', JSON.stringify(chatHistories));
                renderHistoryList();
            }

            appendMessage('user', text);
            userInput.value = '';
            userInput.style.height = 'auto';

            const loadingId = 'loading-' + Date.now();
            appendMessage('ai', `<span class="loading-subtext">正在思考...</span>`, loadingId);

            try {
                const response = await fetch('/api/chat/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, thread_id: currentThreadId, model: currentModel })
                });
                const data = await response.json();
                const loader = document.getElementById(loadingId);
                if (loader) loader.remove();
                appendMessage('ai', data.reply);
            } catch (e) {
                const loader = document.getElementById(loadingId);
                if (loader) {
                    const contentArea = loader.querySelector('.message-content');
                    if (contentArea) contentArea.innerText = "连接失败，后端未响应。";
                }
            }
        }

        function appendMessage(role, content, id = null) {
            const row = document.createElement('div');
            row.className = `message-row ${role === 'user' ? 'user-row' : 'ai-row'}`;
            if (id) row.id = id;

            let html = '';
            if (role === 'ai') {
                const isLoader = id && id.startsWith('loading');
                const avatarClass = isLoader ? 'avatar thinking-avatar' : 'avatar';
                const parsedContent = isLoader ? content : marked.parse(content);
                const contentClass = isLoader ? 'message-content' : 'message-content markdown-body';

                html += `<div class="${avatarClass}"></div>`;
                html += `<div class="${contentClass}">${parsedContent}</div>`;
            } else {
                html += `<div class="message-content">${content}</div>`;
            }

            row.innerHTML = html;
            chatBox.appendChild(row);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        userInput.oninput = function() {
            this.style.height = 'auto';
            const newHeight = this.scrollHeight;
            this.style.height = newHeight + 'px';
            this.style.overflowY = newHeight > 200 ? 'auto' : 'hidden';
        };

        userInput.onkeydown = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSendMessage();
            }
        };

        document.getElementById('sendBtn').onclick = handleSendMessage;

        if (chatHistories.length > 0) {
            const lastChat = chatHistories[0];
            switchChat(lastChat.id, lastChat.title);
        } else {
            renderHistoryList();
            showWelcome();
        }
    </script>
</body>
</html>
